<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="edit_perusahaan.css">
  <title>Edit Perusahaan</title>
</head>
<body>
  <div class="container">
    <h1>Edit Data Perusahaan</h1>
    <form action="proses_edit.php" method="POST">
      <table>
        <tr>
          <td><label for="id">ID</label></td>
          <td><input type="text" id="id" name="id" value="1" readonly></td>
        </tr>
        <tr>
          <td><label for="nama">Nama Perusahaan</label></td>
          <td><input type="text" id="nama" name="nama" value="XYZ"></td>
        </tr>
        <tr>
          <td><label for="alamat">Alamat</label></td>
          <td><textarea id="alamat" name="alamat" rows="3">QWERTYUIOSDFGHJKCVBNGH</textarea></td>
        </tr>
        <tr>
          <td><label for="email">Email</label></td>
          <td><input type="email" id="email" name="email" value="XYZ@gmail.com"></td>
        </tr>
        <tr>
          <td><label for="telepon">Telepon</label></td>
          <td><input type="text" id="telepon" name="telepon" value="08821345678"></td>
        </tr>
        <tr>
          <td><label for="karyawan">Jumlah Karyawan</label></td>
          <td><input type="number" id="karyawan" name="karyawan" value="15"></td>
        </tr>
        <tr>
          <td><label for="dana">Dana di Bank</label></td>
          <td><input type="text" id="dana" name="dana" value="15000000"></td>
        </tr>
      </table>
      <div class="buttons">
        <button type="submit">Simpan</button>
        <button type="button" onclick="window.location.href='perusahaan.html'">Batal</button>
      </div>
    </form>
  </div>
</body>
</html>
